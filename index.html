<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI / ML Trend Explorer</title>
  <link rel="icon" type="image/png" href="./dashboard/img/icon.png">
  <link rel="stylesheet" href="./dashboard/styles/main.css">
</head>
<body>
  <div id="main-container">
    <div id="caption">
      <span>
        <a href="" style="text-decoration: none; color: inherit">
            <h1>
                AI/ML Trend<br/>Explorer
            </h1>
        </a>        
        <div style="padding-top: 16px">v0.8.0-mock</div>
        <div id="subheading"></div>
        <div style="color: #94a3b8">arXiv Paper Statistics</div>
      </span>
    </div>

    <a href="https://github.com/manhowong/ai-ml-trend-explorer/issues/new" target="_blank" 
        id="report-link">
        <svg height="20" viewBox="0 0 20 10" width="20" aria-hidden="true">
            <path fill="#94a3b8" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 
            7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69
            -.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 
            1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64
            -.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67
            -.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2
            -.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07
            -1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 
            .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
        </svg>
        Report an issue
    </a>

    <div id="chart-wrapper">
      <aside id="sidebar">
        <button id="sidebarToggle" title="Collapse sidebar"></button>

        <div id="sidebarContent">
          <div id="dateRangeControl">
            <div class="date-range-header">Date Range</div>
            <div class="date-range-row">
              <select id="startMonthSelect" class="date-range-select"></select>
              <span class="date-range-sep">to</span>
              <select id="endMonthSelect" class="date-range-select"></select>
            </div>
          </div>

          <div id="edgeToggleControl">
            <label class="edge-toggle-row">
              <span>Cross-Category Links</span>
              <input type="checkbox" id="toggleCrossEdges" checked>
              <span class="switch"></span>
            </label>
            <label class="edge-toggle-row">
              <span>Within-Category Links</span>
              <input type="checkbox" id="toggleIntraEdges" checked>
              <span class="switch"></span>
            </label>
          </div>

          <div id="fontSizeControl">
            <div class="font-size-header">
              <span class="font-size-label">Font Size</span>
              <div class="font-size-right">
                <span id="fontSizeVal">10px</span>
                <span id="fontSizeReset" title="Reset to default">↺</span>
              </div>
            </div>
            <input type="range" id="fontSlider" min="6" max="20" value="10">
          </div>

          <button id="fitBtn">⊡ Fit Screen</button>

          <hr class="sidebar-divider">

          <section id="legend">
            <div class="legend-item">
              <span class="legend-dot" style="background:#e84b4b"></span>
              Heating Up
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#541ffd"></span>
              Cooling Off
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:#94a3b8"></span>
              Stable / Insufficient Data
            </div>
            <p class="legend-note">Node size = paper count</p>
            <p class="legend-note">Link width = co-occurrence</p>
          </section>
        </div>
      </aside>

      <div id="chart"></div>
    </div>

    <div id="right-panel">
      <div id="panel-breadcrumb">
        <div id="treeItems"></div>
      </div>

      <div class="info-box" id="info-top">
        <div class="info-box-header">
          <span class="info-box-title" id="info-top-title">Categories</span>
          <div class="info-sort-controls" id="info-top-sort"></div>
        </div>
        <div class="info-box-content" id="info-top-content"></div>
      </div>

      <div class="info-box" id="info-bottom">
        <div class="info-box-header">
          <span class="info-box-title" id="info-bottom-title">About</span>
          <div class="info-sort-controls" id="info-bottom-sort"></div>
        </div>
        <div class="info-box-content" id="info-bottom-content"></div>
      </div>

      <div id="panel-footer">
        <span class="info-box-title">Created by:</span>
        <a href="https://www.linkedin.com/in/mh-wong" target="_blank">Man Ho Wong</a> |
        <a href="https://github.com/manhowong/ai-ml-trend-explorer" target="_blank">data + code</a> |
        <a href="https://github.com/manhowong/ai-ml-trend-explorer/blob/main/LICENSE" target="_blank">license</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script type="module" src="./dashboard/scripts/main.js"></script>
</body>
</html>
