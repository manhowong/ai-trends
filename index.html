<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI / ML Trend Explorer</title>
    <link rel="icon" type="image/png" href="./dashboard/img/icon.png">
    <link rel="stylesheet" href="./dashboard/styles/main.css">
</head>

<body>
    <div id="main-container">

        <div id="site-banner">

            <h1>AI<span id="slash-mark"></span>ML 
                Trend<br />
                Explorer 
            </h1>

            <div id="site-info">
                <div id="dateText"></div>
                arXiv article statistics (preliminary)
            </div>

            <div id="menu">

                <div id="report-link">
                    <a href="https://github.com/manhowong/ai-trends/issues/new" target="_blank">
                        <span class="github-icon"></span> Report an issue
                    </a>
                </div>

                <span> | </span>

                <button id="themeToggle" type="button" aria-pressed="true" title="Toggle light/dark theme">
                    <span class="toggle-label">Dark</span>
                    <span class="ui-switch" aria-hidden="true">
                        <span class="ui-switch-thumb"></span>
                    </span>
                </button>

            </div>

        </div>

        <div id="chart-wrapper">
            <div id="chart"></div>
        </div>
        <div id="sidebar">

            <button id="sidebarToggle" title="Collapse sidebar">
                <div class="initial-label">
                    <span class="down-icon">Hide</span> 
                </div>
                <div class="transformed-label">
                    <span class="hamburger-icon">Graph Control</span> 
                </div>
            </button>

            <div id="sidebarContent">
                <div id="dateRangeControl">
                    <div class="date-range-header">Date Range</div>
                    <div class="date-range-row">
                        <select id="startMonthSelect" class="date-range-select form-select"></select>
                        <span class="date-range-sep">to</span>
                        <select id="endMonthSelect" class="date-range-select form-select"></select>
                    </div>
                </div>

                <div id="paperThresholdControl">
                    <div class="paper-threshold-header">
                        <span class="paper-threshold-label">Min. Topic Size</span>
                        <div class="paper-threshold-right">
                            <span id="paperThresholdVal">1</span>
                        </div>
                    </div>
                    <input type="range" id="paperThresholdSlider">
                </div>

                <button id="searchBtn" class="form-btn">
                    <span class="icon search-icon">Go to Topics...</span>
                </button>

                <div id="edgeToggleControl">
                    <label class="edge-toggle-row">
                        <span>Cross-Category Links</span>
                        <input type="checkbox" id="toggleCrossEdges" checked>
                        <span class="ui-switch"><span class="ui-switch-thumb"></span></span>
                    </label>
                    <label class="edge-toggle-row">
                        <span>Within-Category Links</span>
                        <input type="checkbox" id="toggleIntraEdges" checked>
                        <span class="ui-switch"><span class="ui-switch-thumb"></span></span>
                    </label>
                </div>

                <div id="fontSizeControl">
                    <div class="font-size-header">
                        <span class="font-size-label">Font Size</span>
                        <div class="font-size-right">
                            <span id="fontSizeVal">10px</span>
                            <span id="fontSizeReset" title="Reset to default">
                                <span class="icon anticlock-nospace-icon"></span>
                            </span>
                        </div>
                    </div>
                    <input type="range" id="fontSlider" min="6" max="20" value="10">
                </div>

                <button id="fitBtn" class="form-btn">
                    <span class="icon screen-icon">Fit Screen</span>
                </button>
                
                <button id="reloadBtn" class="form-btn" onclick="window.location.reload();">
                    <span class="icon anticlock-icon">Reload</span>
                </button>
                
                <div id="legend">
                    <div class="legend-item">
                        <span class="legend-dot" style="background:var(--trend-up)"></span>
                        Heating Up
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background:var(--trend-down)"></span>
                        Cooling Off
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background:var(--trend-flat)"></span>
                        Stable / No Data
                    </div>
                    <p class="legend-note">Node size = normalized article count</p>
                    <p class="legend-note">Link width = relevance (DSC)</p>
                </div>
            </div>
        </div>

        <div id="right-panel">

            <button id="panelToggle" title="Collapse panel">
                <div class="initial-label">
                    <span class="down-icon">Hide</span> 
                </div>
                <div class="transformed-label">
                    <span class="up-icon">Open</span> 
                </div>
            </button>

            <div id="panelContent">
                <div id="panel-breadcrumb">
                    <div id="treeItems"></div>
                </div>

                <div class="info-box" id="info-top">
                    <div class="info-box-header">
                        <span class="info-box-title" id="info-top-title">Categories</span>
                        <div class="info-sort-controls" id="info-top-sort"></div>
                    </div>
                    <div class="info-box-content" id="info-top-content"></div>
                </div>

                <div class="info-box" id="info-bottom">
                    <div class="info-box-header">
                        <span class="info-box-title" id="info-bottom-title">About</span>
                        <div class="info-sort-controls" id="info-bottom-sort"></div>
                    </div>
                    <div class="info-box-content" id="info-bottom-content"></div>
                </div>

                <div id="panel-footer">
                    <span class="info-box-title">Created by:</span>
                    <a href="https://github.com/manhowong/" target="_blank">Man Ho Wong</a> |
                    <a href="https://github.com/manhowong/ai-trends" target="_blank">data + code</a> |
                    <a href="https://github.com/manhowong/ai-trends/blob/main/LICENSE"
                        target="_blank">license</a>
                </div>
            </div><!-- /panelContent -->
        </div><!-- /right-panel -->

    </div><!-- /main-container -->

    <div id="search-overlay">
        <div id="search-backdrop"></div>
        <div id="search-modal">
            <input
            id="search-input"
            type="text"
            placeholder="Search topics or categories..."
            autocomplete="off"
            spellcheck="false"
            />
            <div id="search-results"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script type="module" src="./dashboard/scripts/main.js"></script>
</body>

</html>
