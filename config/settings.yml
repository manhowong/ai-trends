arxiv:
  categories:
    - cs.LG   # Machine Learning
    - cs.AI   # Artificial Intelligence
    - cs.CL   # Computation and Language
    - cs.CV   # Computer Vision and Pattern Recognition
    - cs.NE   # Neural and Evolutionary Computing
    - cs.RO   # Robotics
    - cs.IR   # Information Retrieval
    - cs.CR   # Cryptography and Security
    - cs.HC   # Human-Computer Interaction
    - cs.MA   # Multiagent Systems
    - cs.GT   # Computer Science and Game Theory
    - stat.ML # Machine Learning (Statistics)
    - stat.AP # Applications (Statistics)
    - econ.GN # General Economics
    - q-bio.QM # Quantitative Methods (Biology)

# Classification by embedding --------------------------------------------------

embedding:
  model: BAAI/bge-small-en-v1.5
  batch_size: 256
  device: cpu                    # or cuda if available

classification:                # TODO: Tune these 
  confidence_threshold: 0.80   # routes to LLM if top score below this
  t1_gap: 0.02                 # max gap from top node to include a second T1
  top_n_candidates: 5          # candidates to be used as LLM context for classifying ambiguous papers

# Keywords (top K terms) extraction --------------------------------------------

spacy:
  model: en_core_web_sm          # SpaCy model for lemmatization

tfidf:
  top_k: 10           # Extract max top K terms (words or phrases)
  max_features: 50000 # max number of unique terms
  max_df: 0.5         # Ignore terms that appear in > max_df % of all topics 
  min_df: 1           # Only include terms that appear in >= min_df topic(s)

Keyword_stat:
  min_abs: 1          # Only include terms that appear in > min_abs abstract(s)